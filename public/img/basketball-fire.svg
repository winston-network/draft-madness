<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Fire trail -->
  <path d="M32 58c-3-4-8-10-10-18-1-5 0-9 3-13 2 4 5 6 8 6s6-2 8-6c3 4 4 8 3 13-2 8-7 14-10 18z" fill="url(#fire1)" opacity="0.9"/>
  <path d="M32 62c-2-3-6-8-7-14-1-4 0-7 2-10 2 3 4 5 6 5s4-2 6-5c2 3 3 6 2 10-1 6-5 11-7 14z" fill="url(#fire2)" opacity="0.8"/>
  <!-- Basketball -->
