  <!-- Seam lines -->
  <path d="M14 28h36" stroke="#c45a10" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M32 10v36" stroke="#c45a10" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M20 12c4 5 6 10 6 16s-2 11-6 16" stroke="#c45a10" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M44 12c-4 5-6 10-6 16s2 11 6 16" stroke="#c45a10" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Highlight -->
  <ellipse cx="24" cy="20" rx="5" ry="3" fill="rgba(255,255,255,0.2)" transform="rotate(-20 24 20)"/>
  <defs>
    <radialGradient id="ball" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#ff9240"/>
      <stop offset="50%" stop-color="#f47920"/>
      <stop offset="100%" stop-color="#d96510"/>
    </radialGradient>
    <linearGradient id="fire1" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f47920"/>
      <stop offset="40%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fire2" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ff9240"/>
      <stop offset="100%" stop-color="#f5c842" stop-opacity="0"/>
