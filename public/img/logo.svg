<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180">
  <defs>
    <linearGradient id="bg-shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2137"/>
      <stop offset="100%" style="stop-color:#050d18"/>
    </linearGradient>
    <linearGradient id="crimson" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#da1f26"/>
      <stop offset="50%" style="stop-color:#ff2d35"/>
      <stop offset="100%" style="stop-color:#da1f26"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="40%" style="stop-color:#e8ecf2"/>
      <stop offset="100%" style="stop-color:#a0b0c8"/>
    </linearGradient>
    <linearGradient id="gold-bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5c842; stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#f5c842"/>
      <stop offset="85%" style="stop-color:#e8a825"/>
      <stop offset="100%" style="stop-color:#e8a825; stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="ball-grad" x1="25%" y1="10%" x2="75%" y2="90%">
      <stop offset="0%" style="stop-color:#ffA050"/>
      <stop offset="30%" style="stop-color:#ff7830"/>
      <stop offset="70%" style="stop-color:#e85a10"/>
      <stop offset="100%" style="stop-color:#c04008"/>
    </linearGradient>
    <linearGradient id="player-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#90a8c8"/>
    </linearGradient>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#ff2d35" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feComposite in="SourceGraphic"/>
    </filter>
    <filter id="drop-lg">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000060"/>
    </filter>
    <filter id="drop-sm">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000040"/>
    </filter>
    <filter id="ball-glow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#ff6b3540"/>
    </filter>
    <clipPath id="bclip"><circle cx="0" cy="0" r="42"/></clipPath>
    <clipPath id="shield-clip"><rect x="2" y="6" width="596" height="168" rx="10"/></clipPath>
  </defs>

  <!-- Background shield -->
  <rect x="2" y="6" width="596" height="168" rx="10" fill="url(#bg-shield)" filter="url(#drop-lg)"/>

  <!-- Court floor texture inside shield -->
  <g clip-path="url(#shield-clip)" opacity="0.04">
    <line x1="300" y1="6" x2="300" y2="174" stroke="white" stroke-width="2"/>
    <circle cx="300" cy="90" r="50" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="300" cy="90" r="16" fill="none" stroke="white" stroke-width="2"/>
    <rect x="2" y="30" width="120" height="120" fill="none" stroke="white" stroke-width="2"/>
    <rect x="478" y="30" width="120" height="120" fill="none" stroke="white" stroke-width="2"/>
  </g>

  <!-- Crimson diagonal slash -->
  <g clip-path="url(#shield-clip)">
    <polygon points="0,0 100,0 50,180 0,180" fill="#da1f26" opacity="0.06"/>
    <polygon points="520,0 600,0 600,180 560,180" fill="#da1f26" opacity="0.04"/>
  </g>

  <!-- Top crimson bar -->
  <rect x="2" y="6" width="596" height="4" rx="2" fill="url(#crimson)" opacity="0.9"/>

  <!-- Player silhouette (dunking / reaching up) -->
  <g transform="translate(70, 16) scale(0.92)" fill="url(#player-fill)" opacity="0.95" filter="url(#drop-sm)">
    <!-- Head -->
    <ellipse cx="38" cy="12" rx="10" ry="11"/>
    <!-- Torso stretched upward -->
    <path d="M30,22 C28,26 26,36 28,52 L32,53 C33,40 36,30 38,24 L44,24 C46,30 48,40 48,53 L52,52 C54,36 52,26 48,22 Z"/>
    <!-- Right arm reaching up with ball -->
    <path d="M50,26 C56,18 62,10 68,4 L72,2 C76,0 78,2 76,6 L70,12 C64,18 58,24 52,30 Z"/>
    <!-- Left arm out for balance -->
    <path d="M28,30 C22,36 14,42 8,46 L4,48 C0,50 0,48 2,44 L10,38 C16,34 24,28 30,26 Z"/>
    <!-- Right leg forward -->
    <path d="M46,50 C50,64 54,80 56,98 L58,120 C60,128 56,130 52,126 L48,104 C46,86 44,70 42,56 Z"/>
    <!-- Left leg back -->
    <path d="M30,50 C26,62 20,78 14,94 L8,114 C6,122 10,124 14,118 L22,98 C28,82 32,66 34,54 Z"/>
  </g>

  <!-- Basketball in player's hand -->
  <g transform="translate(142, 16)" filter="url(#ball-glow)">
    <circle cx="0" cy="0" r="18" fill="url(#ball-grad)"/>
    <g clip-path="url(#bclip)" stroke="#a03000" stroke-opacity="0.5" fill="none" transform="scale(0.43)">
      <path d="M-42,0 C-20,-18 20,-18 42,0" stroke-width="3"/>
      <path d="M-42,0 C-20,18 20,18 42,0" stroke-width="3"/>
      <line x1="0" y1="-42" x2="0" y2="42" stroke-width="3"/>
    </g>
    <!-- Shine -->
    <ellipse cx="-5" cy="-6" rx="10" ry="8" fill="white" opacity="0.18"/>
  </g>

  <!-- Motion lines behind ball -->
  <g stroke="rgba(255,255,255,0.12)" stroke-width="2" stroke-linecap="round">
    <line x1="115" y1="10" x2="100" y2="6"/>
    <line x1="112" y1="18" x2="95" y2="16"/>
    <line x1="114" y1="26" x2="98" y2="26"/>
  </g>

  <!-- DRAFT text -->
  <text x="178" y="82" font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif" font-size="68" font-weight="900" fill="url(#chrome)" letter-spacing="7" filter="url(#drop-sm)">DRAFT</text>

  <!-- Gold accent bar -->
  <rect x="178" y="90" width="340" height="4" rx="2" fill="url(#gold-bar)"/>

  <!-- MADNESS text -->
  <text x="178" y="148" font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif" font-size="58" font-weight="900" fill="url(#crimson)" letter-spacing="9" filter="url(#glow-red)">MADNESS</text>

  <!-- Bracket + trophy (right side) -->
  <g transform="translate(520, 30)" stroke="white" stroke-width="1.8" opacity="0.18" fill="none" stroke-linecap="round">
    <path d="M0,0 H12 V10 H22"/>
    <path d="M0,20 H12 V10"/>
    <path d="M0,55 H12 V65 H22"/>
    <path d="M0,75 H12 V65"/>
    <path d="M22,10 V38"/>
    <path d="M22,65 V38"/>
    <path d="M22,38 H36"/>
    <g transform="translate(42, 30)" stroke="#f5c842" opacity="0.6">
      <path d="M-5,-8 Q-7,-8 -7,-5 V-1 Q-7,5 0,7 Q7,5 7,-1 V-5 Q7,-8 5,-8 Z" stroke-width="1.5" fill="#f5c84208"/>
      <line x1="0" y1="7" x2="0" y2="12" stroke-width="1.5"/>
      <line x1="-4" y1="12" x2="4" y2="12" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Year badge -->
  <rect x="516" y="114" width="50" height="22" rx="4" fill="#da1f26"/>
  <text x="541" y="130" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="13" font-weight="900" fill="white" letter-spacing="1.5">2026</text>

  <!-- Bottom crimson accent -->
  <rect x="2" y="170" width="596" height="4" rx="2" fill="url(#crimson)" opacity="0.5"/>
</svg>
