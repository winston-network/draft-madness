<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Base warm wood color -->
  <rect width="400" height="400" fill="#1a1008"/>

  <!-- Plank rows -->
  <g stroke="rgba(0,0,0,0.3)" stroke-width="1">
    <!-- Horizontal plank lines -->
    <line x1="0" y1="50" x2="400" y2="50"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="0" y1="350" x2="400" y2="350"/>

    <!-- Staggered vertical plank joints -->
    <line x1="120" y1="0" x2="120" y2="50"/>
    <line x1="280" y1="0" x2="280" y2="50"/>

    <line x1="60" y1="50" x2="60" y2="100"/>
    <line x1="200" y1="50" x2="200" y2="100"/>
    <line x1="340" y1="50" x2="340" y2="100"/>

    <line x1="130" y1="100" x2="130" y2="150"/>
    <line x1="300" y1="100" x2="300" y2="150"/>

    <line x1="80" y1="150" x2="80" y2="200"/>
    <line x1="220" y1="150" x2="220" y2="200"/>
    <line x1="360" y1="150" x2="360" y2="200"/>

    <line x1="140" y1="200" x2="140" y2="250"/>
    <line x1="310" y1="200" x2="310" y2="250"/>

    <line x1="50" y1="250" x2="50" y2="300"/>
    <line x1="190" y1="250" x2="190" y2="300"/>
    <line x1="350" y1="250" x2="350" y2="300"/>

    <line x1="110" y1="300" x2="110" y2="350"/>
    <line x1="270" y1="300" x2="270" y2="350"/>

    <line x1="70" y1="350" x2="70" y2="400"/>
    <line x1="210" y1="350" x2="210" y2="400"/>
    <line x1="370" y1="350" x2="370" y2="400"/>
  </g>

  <!-- Wood grain lines - subtle horizontal streaks -->
  <g stroke="rgba(180,120,60,0.06)" stroke-width="0.5" fill="none">
    <path d="M0 12 Q100 10 200 14 Q300 11 400 13"/>
    <path d="M0 28 Q150 25 250 30 Q350 27 400 29"/>
    <path d="M0 38 Q80 41 200 37 Q320 40 400 38"/>

    <path d="M0 62 Q120 58 220 64 Q330 60 400 63"/>
    <path d="M0 78 Q100 82 250 76 Q350 80 400 78"/>
    <path d="M0 88 Q180 85 280 90 Q380 87 400 89"/>

    <path d="M0 112 Q90 108 200 114 Q310 110 400 113"/>
    <path d="M0 128 Q140 132 260 126 Q360 130 400 128"/>
    <path d="M0 142 Q100 138 220 144 Q340 140 400 142"/>

    <path d="M0 162 Q110 158 230 164 Q340 160 400 163"/>
    <path d="M0 178 Q130 182 250 176 Q360 180 400 178"/>
    <path d="M0 192 Q80 188 190 194 Q320 190 400 192"/>

    <path d="M0 212 Q120 208 240 214 Q350 210 400 213"/>
    <path d="M0 228 Q100 232 220 226 Q340 230 400 228"/>
    <path d="M0 242 Q150 238 260 244 Q370 240 400 242"/>

    <path d="M0 262 Q90 258 200 264 Q310 260 400 263"/>
    <path d="M0 278 Q140 282 270 276 Q370 280 400 278"/>
    <path d="M0 292 Q110 288 230 294 Q350 290 400 292"/>

    <path d="M0 312 Q100 308 210 314 Q320 310 400 313"/>
    <path d="M0 332 Q130 336 250 330 Q370 334 400 332"/>
    <path d="M0 342 Q80 338 190 344 Q310 340 400 342"/>

    <path d="M0 362 Q120 358 240 364 Q360 360 400 363"/>
    <path d="M0 382 Q100 386 230 380 Q350 384 400 382"/>
    <path d="M0 392 Q150 388 270 394 Q380 390 400 392"/>
  </g>

  <!-- Subtle warm color variation per plank -->
  <rect x="0" y="0" width="400" height="50" fill="rgba(160,100,40,0.03)"/>
  <rect x="0" y="100" width="400" height="50" fill="rgba(140,85,30,0.04)"/>
  <rect x="0" y="200" width="400" height="50" fill="rgba(160,100,40,0.03)"/>
  <rect x="0" y="300" width="400" height="50" fill="rgba(140,85,30,0.04)"/>
</svg>
