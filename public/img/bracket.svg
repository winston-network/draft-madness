<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Semifinal bracket lines -->
  <g stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round" fill="none">
    <!-- Left side - 4 teams down to 2 to 1 -->
    <!-- Top pair -->
    <line x1="6" y1="10" x2="18" y2="10"/>
    <line x1="6" y1="22" x2="18" y2="22"/>
    <line x1="18" y1="10" x2="18" y2="22"/>
    <line x1="18" y1="16" x2="28" y2="16"/>
    <!-- Bottom pair -->
    <line x1="6" y1="42" x2="18" y2="42"/>
    <line x1="6" y1="54" x2="18" y2="54"/>
    <line x1="18" y1="42" x2="18" y2="54"/>
    <line x1="18" y1="48" x2="28" y2="48"/>
    <!-- Semifinal -->
    <line x1="28" y1="16" x2="28" y2="48"/>
    <line x1="28" y1="32" x2="38" y2="32"/>
    <!-- Right side mirror -->
    <line x1="58" y1="10" x2="46" y2="10"/>
    <line x1="58" y1="22" x2="46" y2="22"/>
    <line x1="46" y1="10" x2="46" y2="22"/>
    <line x1="46" y1="16" x2="36" y2="16"/>
    <line x1="58" y1="42" x2="46" y2="42"/>
    <line x1="58" y1="54" x2="46" y2="54"/>
    <line x1="46" y1="42" x2="46" y2="54"/>
    <line x1="46" y1="48" x2="36" y2="48"/>
    <line x1="36" y1="16" x2="36" y2="48"/>
    <line x1="36" y1="32" x2="38" y2="32"/>
  </g>
  <!-- Trophy/champion dot -->
  <circle cx="38" cy="32" r="3" fill="#f47920" opacity="0.9"/>
  <circle cx="38" cy="32" r="5" stroke="#f47920" stroke-width="1" fill="none" opacity="0.4"/>
</svg>
