<svg xmlns="http://www.w3.org/2000/svg" width="240" height="100" viewBox="0 0 240 100" fill="none">
  <!-- Hand-drawn X's and O's with play arrows -->
  <g stroke-linecap="round" fill="none">
    <!-- X marks - orange chalk -->
    <g stroke="rgba(244,121,32,0.18)" stroke-width="2">
      <line x1="18" y1="14" x2="28" y2="24"/>
      <line x1="28" y1="14" x2="18" y2="24"/>

      <line x1="95" y1="60" x2="105" y2="70"/>
      <line x1="105" y1="60" x2="95" y2="70"/>

      <line x1="175" y1="10" x2="185" y2="20"/>
      <line x1="185" y1="10" x2="175" y2="20"/>

      <line x1="155" y1="72" x2="165" y2="82"/>
      <line x1="165" y1="72" x2="155" y2="82"/>

      <line x1="120" y1="5" x2="128" y2="13"/>
      <line x1="128" y1="5" x2="120" y2="13"/>

      <line x1="52" y1="78" x2="60" y2="86"/>
      <line x1="60" y1="78" x2="52" y2="86"/>
    </g>

    <!-- O marks - white chalk -->
    <g stroke="rgba(255,255,255,0.12)" stroke-width="1.8">
      <circle cx="55" cy="30" r="7"/>
      <circle cx="140" cy="18" r="6"/>
      <circle cx="210" cy="55" r="7"/>
      <circle cx="30" cy="70" r="5.5"/>
      <circle cx="195" cy="88" r="5"/>
      <circle cx="80" cy="8" r="5.5"/>
    </g>

    <!-- Play arrows / routes -->
    <g stroke="rgba(255,255,255,0.07)" stroke-width="1.2">
      <path d="M65 35 Q78 25 88 35"/>
      <path d="M85 35 l4 -3 l-1 4" fill="rgba(255,255,255,0.07)"/>

      <path d="M150 25 Q160 15 172 22"/>
      <path d="M170 22 l3 -2 l-1 3.5" fill="rgba(255,255,255,0.07)"/>

      <path d="M215 60 Q225 50 232 58"/>
    </g>

    <!-- Court lines - subtle -->
    <line x1="0" y1="50" x2="240" y2="50" stroke="rgba(255,255,255,0.04)" stroke-width="0.8"/>
    <circle cx="120" cy="50" r="22" stroke="rgba(255,255,255,0.04)" stroke-width="0.8"/>
    <line x1="120" y1="0" x2="120" y2="100" stroke="rgba(255,255,255,0.03)" stroke-width="0.8"/>
    <!-- Free throw circles -->
    <path d="M35 0 Q35 20 35 30" stroke="rgba(255,255,255,0.025)" stroke-width="0.8"/>
    <path d="M205 100 Q205 80 205 70" stroke="rgba(255,255,255,0.025)" stroke-width="0.8"/>
  </g>
</svg>
