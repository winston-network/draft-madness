<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" fill="none">
  <!-- Basketball court lines - prominent -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- Half court line -->
    <line x1="600" y1="0" x2="600" y2="700"/>
    <!-- Center circle -->
    <circle cx="600" cy="350" r="80"/>
    <!-- Court boundary -->
    <rect x="40" y="30" width="1120" height="640" rx="8"/>
    <!-- Left free throw / key -->
    <rect x="40" y="200" width="180" height="300" rx="4"/>
    <circle cx="220" cy="350" r="60"/>
    <!-- Right free throw / key -->
    <rect x="980" y="200" width="180" height="300" rx="4"/>
    <circle cx="980" cy="350" r="60"/>
    <!-- Three point arcs -->
    <path d="M40 160 Q280 350 40 540"/>
    <path d="M1160 160 Q920 350 1160 540"/>
  </g>

  <!-- Hand-drawn X's - big, loose, sketchy (5 total) -->
  <g stroke="rgba(244,121,32,0.14)" stroke-width="3.5" stroke-linecap="round" fill="none">
    <!-- X 1 - top left area -->
    <line x1="130" y1="80" x2="175" y2="130"/>
    <line x1="172" y1="78" x2="133" y2="128"/>

    <!-- X 2 - center right -->
    <line x1="820" y1="280" x2="870" y2="335"/>
    <line x1="867" y1="278" x2="823" y2="333"/>

    <!-- X 3 - bottom left -->
    <line x1="280" y1="520" x2="330" y2="575"/>
    <line x1="327" y1="518" x2="283" y2="573"/>

    <!-- X 4 - top right -->
    <line x1="950" y1="90" x2="995" y2="140"/>
    <line x1="992" y1="88" x2="953" y2="138"/>

    <!-- X 5 - bottom center -->
    <line x1="550" y1="580" x2="598" y2="632"/>
    <line x1="595" y1="578" x2="553" y2="630"/>
  </g>

  <!-- Hand-drawn O's - big, slightly imperfect circles (5 total) -->
  <g stroke="rgba(255,255,255,0.1)" stroke-width="3" stroke-linecap="round" fill="none">
    <!-- O 1 - left of center -->
    <ellipse cx="400" cy="170" rx="24" ry="22"/>

    <!-- O 2 - right side -->
    <ellipse cx="1050" cy="430" rx="22" ry="25"/>

    <!-- O 3 - bottom left -->
    <ellipse cx="150" cy="460" rx="25" ry="23"/>

    <!-- O 4 - top center -->
    <ellipse cx="700" cy="100" rx="23" ry="21"/>

    <!-- O 5 - center -->
    <ellipse cx="480" cy="420" rx="21" ry="24"/>
  </g>
</svg>
