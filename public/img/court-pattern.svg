<svg xmlns="http://www.w3.org/2000/svg" width="2800" height="1600" viewBox="0 0 2800 1600" fill="none">

  <!-- Big sweeping white arrows / play routes - thick and bold -->
  <g stroke="rgba(255,255,255,0.18)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Large arc top-left sweeping left -->
    <path d="M700 700 Q400 160 200 300"/>
    <path d="M216 284 l-36 4 l16 32"/>

    <!-- Large arc top-center sweeping up -->
    <path d="M900 900 Q1000 300 1100 200"/>
    <path d="M1094 216 l12 -32 l20 28"/>

    <!-- Big right arc -->
    <path d="M1500 600 Q2200 160 2400 500"/>
    <path d="M2388 484 l24 -20 l-4 32"/>

    <!-- Crossing curves bottom center -->
    <path d="M700 1100 Q1100 1400 1500 1000"/>
    <path d="M1488 1012 l24 -20 l-2 30"/>

    <path d="M1000 1300 Q1400 900 1800 1100"/>
    <path d="M1786 1090 l28 4 l-16 26"/>

    <!-- Bottom-left sweep -->
    <path d="M500 1200 Q200 1000 300 800"/>
    <path d="M306 816 l-12 -32 l-24 24"/>

    <!-- Right side downward -->
    <path d="M2200 700 Q2500 1000 2400 1300"/>
    <path d="M2408 1284 l4 32 l-28 -16"/>

    <!-- Small connecting arrow center -->
    <path d="M1300 700 Q1400 840 1500 800"/>
    <path d="M1488 808 l24 -16 l-8 28"/>
  </g>

  <!-- X marks - orange, bold chalk style, BIG -->
  <g stroke="rgba(244,121,32,0.4)" stroke-width="8" stroke-linecap="round">
    <!-- X top-left -->
    <line x1="100" y1="180" x2="210" y2="300"/>
    <line x1="204" y1="176" x2="106" y2="296"/>

    <!-- X center-right -->
    <line x1="2000" y1="560" x2="2110" y2="680"/>
    <line x1="2104" y1="556" x2="2006" y2="676"/>

    <!-- X bottom-center -->
    <line x1="1660" y1="1240" x2="1770" y2="1360"/>
    <line x1="1764" y1="1236" x2="1666" y2="1356"/>

    <!-- X bottom-right -->
    <line x1="2500" y1="1300" x2="2610" y2="1420"/>
    <line x1="2604" y1="1296" x2="2506" y2="1416"/>
  </g>

  <!-- O marks - green, open circles, BIG -->
  <g stroke="rgba(16,185,129,0.4)" stroke-width="7" fill="none" stroke-linecap="round">
    <!-- O top-center -->
    <circle cx="1300" cy="400" r="50"/>

    <!-- O center-right -->
    <circle cx="1800" cy="760" r="44"/>

    <!-- O center -->
    <circle cx="1440" cy="940" r="48"/>

    <!-- O bottom-left -->
    <circle cx="360" cy="1160" r="52"/>

    <!-- O top-right -->
    <circle cx="2200" cy="260" r="46"/>
  </g>
</svg>
