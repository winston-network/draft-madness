<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80" fill="none">
  <!-- Hand-drawn style X's and O's scattered on abstract court -->
  <g stroke="rgba(244,121,32,0.06)" stroke-width="1.5" stroke-linecap="round" fill="none">
    <!-- X marks -->
    <line x1="15" y1="12" x2="23" y2="20"/>
    <line x1="23" y1="12" x2="15" y2="20"/>

    <line x1="82" y1="55" x2="90" y2="63"/>
    <line x1="90" y1="55" x2="82" y2="63"/>

    <line x1="155" y1="8" x2="163" y2="16"/>
    <line x1="163" y1="8" x2="155" y2="16"/>

    <line x1="140" y1="58" x2="148" y2="66"/>
    <line x1="148" y1="58" x2="140" y2="66"/>

    <!-- O marks -->
    <circle cx="50" cy="45" r="5"/>
    <circle cx="120" cy="15" r="5"/>
    <circle cx="180" cy="50" r="5"/>
    <circle cx="35" cy="68" r="4"/>

    <!-- Court lines - abstract half court -->
    <line x1="0" y1="40" x2="200" y2="40" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
    <circle cx="100" cy="40" r="18" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="80" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>

    <!-- Arrows / play diagrams -->
    <path d="M60 25 Q68 20 75 28" stroke="rgba(244,121,32,0.04)" stroke-width="1"/>
    <path d="M170 30 Q175 22 182 28" stroke="rgba(244,121,32,0.04)" stroke-width="1"/>

    <!-- More scattered X's -->
    <line x1="108" y1="62" x2="114" y2="68"/>
    <line x1="114" y1="62" x2="108" y2="68"/>

    <line x1="62" y1="5" x2="68" y2="11"/>
    <line x1="68" y1="5" x2="62" y2="11"/>
  </g>
</svg>
