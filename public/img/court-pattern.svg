<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" fill="none">
  <!-- Half court - coach's whiteboard style -->

  <!-- Paint / Key - filled orange -->
  <rect x="530" y="60" width="340" height="380" rx="4" fill="rgba(244,121,32,0.06)" stroke="rgba(100,160,255,0.12)" stroke-width="4" stroke-linecap="round"/>

  <!-- Free throw semi-circle (bottom of key) -->
  <path d="M530 440 Q700 560 870 440" stroke="rgba(100,160,255,0.12)" stroke-width="4" fill="rgba(244,121,32,0.04)" stroke-linecap="round"/>

  <!-- Basket / hoop -->
  <circle cx="700" cy="95" r="14" stroke="rgba(244,121,32,0.15)" stroke-width="3" fill="none"/>
  <!-- Backboard -->
  <line x1="660" y1="68" x2="740" y2="68" stroke="rgba(100,160,255,0.14)" stroke-width="4" stroke-linecap="round"/>

  <!-- 3-point arc - thick marker stroke -->
  <path d="M480 60 L480 200 Q700 620 920 200 L920 60" stroke="rgba(100,160,255,0.13)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Baseline -->
  <line x1="200" y1="60" x2="1200" y2="60" stroke="rgba(100,160,255,0.1)" stroke-width="4" stroke-linecap="round"/>

  <!-- Sidelines -->
  <line x1="200" y1="60" x2="200" y2="750" stroke="rgba(100,160,255,0.07)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="1200" y1="60" x2="1200" y2="750" stroke="rgba(100,160,255,0.07)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Hash marks on key -->
  <g stroke="rgba(100,160,255,0.08)" stroke-width="3" stroke-linecap="round">
    <line x1="510" y1="160" x2="530" y2="160"/>
    <line x1="510" y1="220" x2="530" y2="220"/>
    <line x1="510" y1="280" x2="530" y2="280"/>
    <line x1="510" y1="340" x2="530" y2="340"/>
    <line x1="870" y1="160" x2="890" y2="160"/>
    <line x1="870" y1="220" x2="890" y2="220"/>
    <line x1="870" y1="280" x2="890" y2="280"/>
    <line x1="870" y1="340" x2="890" y2="340"/>
  </g>

  <!-- X marks - bold marker style -->
  <g stroke="rgba(244,121,32,0.16)" stroke-width="5" stroke-linecap="round">
    <!-- X near free throw -->
    <line x1="640" y1="340" x2="680" y2="385"/>
    <line x1="678" y1="340" x2="642" y2="385"/>

    <!-- X near elbow -->
    <line x1="830" y1="310" x2="870" y2="355"/>
    <line x1="868" y1="310" x2="832" y2="355"/>

    <!-- X at wing -->
    <line x1="380" y1="440" x2="420" y2="485"/>
    <line x1="418" y1="440" x2="382" y2="485"/>
  </g>

  <!-- O marks - open circles, marker style -->
  <g stroke="rgba(244,121,32,0.18)" stroke-width="4" fill="none" stroke-linecap="round">
    <!-- O at point guard -->
    <ellipse cx="700" cy="610" rx="20" ry="18"/>

    <!-- O at wing left -->
    <ellipse cx="340" cy="530" rx="18" ry="20"/>

    <!-- O at wing right -->
    <ellipse cx="1060" cy="530" rx="19" ry="18"/>

    <!-- O at corner -->
    <ellipse cx="420" cy="160" rx="17" ry="19"/>
  </g>

  <!-- Play arrows - dashed routes with arrowheads -->
  <g stroke="rgba(244,121,32,0.12)" stroke-width="3" fill="none" stroke-linecap="round">
    <!-- Point to wing pass -->
    <line x1="680" y1="600" x2="440" y2="540" stroke-dasharray="12 6"/>
    <path d="M445 543 l-12 3 l5 -10" fill="rgba(244,121,32,0.12)" stroke="none"/>

    <!-- Wing cut to basket -->
    <path d="M355 515 Q400 350 640 340" stroke-dasharray="12 6"/>
    <path d="M636 336 l10 2 l-5 9" fill="rgba(244,121,32,0.12)" stroke="none"/>

    <!-- Drive arrow -->
    <path d="M1045 515 Q950 400 870 350"/>
    <path d="M874 354 l-8 -6 l10 -2" fill="rgba(244,121,32,0.12)" stroke="none"/>
  </g>
</svg>
