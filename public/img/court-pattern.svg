<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" fill="none">

  <!-- Big sweeping white arrows / play routes -->
  <g stroke="rgba(255,255,255,0.14)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Large arc top-left sweeping left -->
    <path d="M350 350 Q200 80 100 150"/>
    <path d="M108 142 l-18 2 l8 16"/>

    <!-- Large arc top-center sweeping up -->
    <path d="M450 450 Q500 150 550 100"/>
    <path d="M547 108 l6 -16 l10 14"/>

    <!-- Big right arc -->
    <path d="M750 300 Q1100 80 1200 250"/>
    <path d="M1194 242 l12 -10 l-2 16"/>

    <!-- Crossing curves bottom center -->
    <path d="M350 550 Q550 700 750 500"/>
    <path d="M744 506 l12 -10 l-1 15"/>

    <path d="M500 650 Q700 450 900 550"/>
    <path d="M893 545 l14 2 l-8 13"/>

    <!-- Bottom-left sweep -->
    <path d="M250 600 Q100 500 150 400"/>
    <path d="M153 408 l-6 -16 l-12 12"/>

    <!-- Right side downward -->
    <path d="M1100 350 Q1250 500 1200 650"/>
    <path d="M1204 642 l2 16 l-14 -8"/>

    <!-- Small connecting arrow center -->
    <path d="M650 350 Q700 420 750 400"/>
    <path d="M744 404 l12 -8 l-4 14"/>
  </g>

  <!-- X marks - orange, bold chalk style -->
  <g stroke="rgba(244,121,32,0.35)" stroke-width="6" stroke-linecap="round">
    <!-- X top-left -->
    <line x1="60" y1="100" x2="115" y2="160"/>
    <line x1="112" y1="98" x2="63" y2="158"/>

    <!-- X center-right -->
    <line x1="1000" y1="280" x2="1055" y2="340"/>
    <line x1="1052" y1="278" x2="1003" y2="338"/>

    <!-- X bottom-center -->
    <line x1="830" y1="620" x2="885" y2="680"/>
    <line x1="882" y1="618" x2="833" y2="678"/>

    <!-- X bottom-right -->
    <line x1="1250" y1="650" x2="1305" y2="710"/>
    <line x1="1302" y1="648" x2="1253" y2="708"/>
  </g>

  <!-- O marks - green, open circles -->
  <g stroke="rgba(16,185,129,0.35)" stroke-width="5" fill="none" stroke-linecap="round">
    <!-- O top-center -->
    <circle cx="650" cy="200" r="25"/>

    <!-- O center-right -->
    <circle cx="900" cy="380" r="22"/>

    <!-- O center -->
    <circle cx="720" cy="470" r="24"/>

    <!-- O bottom-left -->
    <circle cx="180" cy="580" r="26"/>

    <!-- O top-right -->
    <circle cx="1100" cy="130" r="23"/>
  </g>
</svg>
