<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draft Madness</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=__BUILD__">
</head>
<body>

  <!-- LANDING PAGE -->
  <div id="landing-page">
    <div class="landing">
      <img src="/img/logo-main.jpg" alt="Draft Madness" class="landing-logo">
      <p class="landing-tagline">Draft your teams. Track your scores. Win the pot.</p>
      <p class="landing-subtitle">A new take on March Madness brackets &mdash; don't get busted!</p>
      <div class="landing-forms">
        <div class="card" style="max-width:400px; margin:0 auto">
          <h2>Demo</h2>
          <p style="font-size:0.9rem; margin-bottom:0.75rem; opacity:0.7">Try it out — creates a game with 7 bot players and drops you in.</p>
          <input type="text" id="test-name" placeholder="Your name" value="TestPlayer">
          <button class="btn btn-accent btn-lg" onclick="quickTest()" style="width:100%">Launch Demo</button>
        </div>
      </div>
    </div>
  </div>

  <!-- GAME PAGE (single view: header + status bar + draft board with sidebar) -->
  <div id="game-page" style="display:none">
    <div class="header">
      <div class="header-brand">
        <img src="/img/bball_logo.png" alt="" class="header-logo">
        <div class="header-title">
          <h1>Draft <span>Madness</span></h1>
          <p class="header-sub">A New Take on March Madness</p>
        </div>
        <img src="/img/bracket.svg" alt="" class="header-bracket">
      </div>
    </div>

    <div id="status-bar" class="status-bar" style="display:none">
      <div class="status-center">
        <span id="status-text"></span>
        <span id="timer-display" class="timer-display timer-green">3:00</span>
        <button id="pause-resume-btn" class="btn btn-sm pause-btn" style="display:none" onclick="togglePause()"><svg width="14" height="14" viewBox="0 0 14 14"><rect x="1" y="0" width="4" height="14" fill="currentColor"/><rect x="9" y="0" width="4" height="14" fill="currentColor"/></svg></button>
      </div>
    </div>

    <!-- Draft board + sidebar -->
    <div class="game-content">
      <div class="draft-layout">
        <div class="draft-main">
          <div class="card draft-card">
            <h2>Draft Board</h2>
            <div id="draft-rounds-container"></div>
          </div>
        </div>
        <div class="draft-sidebar" id="draft-sidebar-panel">
          <div class="card" id="sidebar-teams-card">
            <h2>Available Teams</h2>
            <div class="teams-list" id="teams-list"></div>
          </div>
          <div id="sidebar-leaderboard" style="display:none; height:100%; overflow-y:auto;">
            <div class="card leaderboard-card" style="margin-bottom:0; height:100%; display:flex; flex-direction:column;">
              <h2>Leaderboard</h2>
              <div class="leaderboard-scroll" style="flex:1; min-height:0;">
                <table class="leaderboard-table" style="min-width:0;">
                  <thead id="sidebar-leaderboard-head"></thead>
                  <tbody id="sidebar-leaderboard-body"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Test Toolbar (floating, shown during test games) -->
  <div id="test-toolbar" class="test-toolbar" style="display:none">
    <button class="btn btn-sm btn-accent" onclick="testSimulateRound()">Bot Picks (to my turn)</button>
    <button class="btn btn-sm btn-primary" onclick="testAutoPickAll()">Auto-Pick All</button>
    <button class="btn btn-sm btn-success" onclick="testSimulateTournamentRound()">Sim Tourney Round</button>
    <button class="btn btn-sm btn-danger" onclick="resetAndReload()">Reset</button>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/api.js?v=__BUILD__"></script>
  <script src="/js/app.js?v=__BUILD__"></script>
</body>
</html>
